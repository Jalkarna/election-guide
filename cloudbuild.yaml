steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/election-guide/app:$BUILD_ID
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/election-guide/app:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/election-guide/app

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - gcloud storage buckets describe gs://election-guide-data-$PROJECT_ID || gcloud storage buckets create gs://election-guide-data-$PROJECT_ID --location=us-central1

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - election-guide
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/election-guide/app:$BUILD_ID
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=8080
      - --timeout=300
      - --execution-environment=gen2
      - --add-volume=name=election-data,type=cloud-storage,bucket=election-guide-data-$PROJECT_ID
      - --add-volume-mount=volume=election-data,mount-path=/data
      - --set-env-vars=DATABASE_URL=sqlite+aiosqlite:////data/election_guide.db,GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=us-central1,GOOGLE_SECRET_NAME=GOOGLE_API_KEY,ENABLE_CLOUD_LOGGING=true
      - --set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/election-guide/app:latest

options:
  logging: CLOUD_LOGGING_ONLY
