steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/election-guide/app:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/election-guide/app:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/election-guide/app

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - election-guide
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/election-guide/app:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=8080
      - --timeout=300
      - --set-env-vars=DATABASE_URL=sqlite+aiosqlite:////data/election_guide.db,GCP_PROJECT_ID=gen-lang-client-0014714910,GCP_LOCATION=us-central1
      - --set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/election-guide/app:latest

options:
  logging: CLOUD_LOGGING_ONLY
